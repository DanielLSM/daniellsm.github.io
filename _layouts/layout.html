<!DOCTYPE html>
<html lang="en">
{% include head.html %}
<body>
  <header class="site-nav">
    <div class="nav-inner">
      <div class="nav-social" aria-label="Social links">
        <a href="mailto:dsimoes@ethz.ch" aria-label="Email">Email</a>
        <a href="https://scholar.google.com/citations?user=sfM-khoAAAAJ&hl=en" target="_blank" rel="noopener" aria-label="Google Scholar">Scholar</a>
        <a href="https://github.com/DanielLSM/" target="_blank" rel="noopener" aria-label="GitHub">GitHub</a>
        <a href="https://www.linkedin.com/in/daniel-marta-556b4023/" target="_blank" rel="noopener" aria-label="LinkedIn">LinkedIn</a>
      </div>

      <nav class="nav-links" aria-label="Main navigation">
        <a href="{{site.github.url}}/" {% if page.url == '/' %}aria-current="page"{% endif %}>Home</a>
        <a href="{{site.github.url}}/research/" {% if page.url contains 'research' %}aria-current="page"{% endif %}>Publications</a>
        <a href="/assets/Daniel_Marta_CV.pdf" target="_blank" rel="noopener">CV</a>
        <button class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">◐</button>
      </nav>
    </div>
    <div class="scroll-progress" aria-hidden="true"><span></span></div>
  </header>

  <main class="page-shell">
    {{content}}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span>© Daniel Marta</span>
      <span><a href="mailto:dsimoes@ethz.ch">dsimoes (at) ethz.ch</a></span>
      <span><a href="mailto:dlmarta@kth.se">dlmarta (at) kth.se</a></span>
      <span><a href="https://scholar.google.com/citations?user=sfM-khoAAAAJ&hl=en" target="_blank" rel="noopener">Scholar</a></span>
      <span><a href="https://github.com/DanielLSM/" target="_blank" rel="noopener">GitHub</a></span>
      <span><a href="https://www.linkedin.com/in/daniel-marta-556b4023/" target="_blank" rel="noopener">LinkedIn</a></span>
    </div>
  </footer>

  <script>
    const root = document.documentElement;
    const storedTheme = localStorage.getItem('theme');
    if (storedTheme === 'dark') root.classList.add('dark');
    document.querySelector('.theme-toggle')?.addEventListener('click', () => {
      root.classList.toggle('dark');
      localStorage.setItem('theme', root.classList.contains('dark') ? 'dark' : 'light');
    });
    const progress = document.querySelector('.scroll-progress span');
    const updateProgress = () => {
      const max = document.documentElement.scrollHeight - window.innerHeight;
      const pct = max > 0 ? (window.scrollY / max) * 100 : 0;
      progress.style.width = `${pct}%`;
    };
    updateProgress();
    document.addEventListener('scroll', updateProgress, { passive: true });
  </script>
</body>
</html>
