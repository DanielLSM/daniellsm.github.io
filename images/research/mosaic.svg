<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
<title id="title">MOSAIC multi-objective preference learning</title>
<desc id="desc">Mosaic tiles representing language-derived objectives, weights, and scalarized rewards.</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#ecfeff"/><stop offset="1" stop-color="#f8fafc"/></linearGradient>
  <linearGradient id="tile" x1="0" x2="1"><stop stop-color="#2563eb"/><stop offset="1" stop-color="#7c3aed"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity=".18"/></filter>
</defs>
<rect width="1200" height="720" rx="48" fill="url(#bg)"/>
<g filter="url(#shadow)">
  <rect x="86" y="78" width="1028" height="564" rx="42" fill="white"/>
</g>
<text x="126" y="156" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800" fill="#0f172a">MOSAIC</text>
<text x="130" y="206" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="600" fill="#475569">language → objectives → weights → rewards</text>
<g transform="translate(130 270)" font-family="Inter, Arial, sans-serif">
  <rect x="0" y="0" width="260" height="124" rx="24" fill="#dbeafe"/>
  <text x="34" y="54" font-size="29" font-weight="800" fill="#1e3a8a">preferences</text>
  <text x="34" y="88" font-size="23" fill="#1e40af">trajectory + reason</text>
  <path d="M300 62h108" stroke="#94a3b8" stroke-width="10" stroke-linecap="round"/><path d="M407 62l-28-22v44z" fill="#94a3b8"/>
  <rect x="452" y="0" width="260" height="124" rx="24" fill="#ede9fe"/>
  <text x="488" y="54" font-size="29" font-weight="800" fill="#4c1d95">LLM parse</text>
  <text x="488" y="88" font-size="23" fill="#6d28d9">features + sentiment</text>
  <path d="M752 62h108" stroke="#94a3b8" stroke-width="10" stroke-linecap="round"/><path d="M859 62l-28-22v44z" fill="#94a3b8"/>
  <rect x="904" y="0" width="150" height="124" rx="24" fill="#dcfce7"/>
  <text x="936" y="54" font-size="29" font-weight="800" fill="#14532d">policy</text>
  <text x="936" y="88" font-size="23" fill="#166534">aligned</text>
</g>
<g transform="translate(155 462)" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" text-anchor="middle">
  <rect x="0" y="0" width="170" height="96" rx="18" fill="url(#tile)" opacity=".92"/><text x="85" y="59" fill="white">safety .40</text>
  <rect x="202" y="0" width="170" height="96" rx="18" fill="#0891b2" opacity=".92"/><text x="287" y="59" fill="white">goal .30</text>
  <rect x="404" y="0" width="170" height="96" rx="18" fill="#f97316" opacity=".9"/><text x="489" y="59" fill="white">speed .20</text>
  <rect x="606" y="0" width="170" height="96" rx="18" fill="#16a34a" opacity=".9"/><text x="691" y="59" fill="white">walls .10</text>
  <rect x="808" y="0" width="170" height="96" rx="18" fill="#0f172a" opacity=".92"/><text x="893" y="44" fill="white">scalarized</text><text x="893" y="72" fill="white">reward</text>
</g>
</svg>