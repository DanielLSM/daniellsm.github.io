<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">SDPO thumbnail</title>
  <desc id="desc">Abstract diagram of feedback-conditioned self-distillation for reinforcement learning.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbecff"/>
      <stop offset="1" stop-color="#eef5ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#b509ac"/>
      <stop offset="1" stop-color="#4f7cff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#28102d" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="800" height="500" rx="36" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="70" y="92" width="210" height="120" rx="22" fill="#fff"/>
    <rect x="295" y="92" width="210" height="120" rx="22" fill="#fff"/>
    <rect x="520" y="92" width="210" height="120" rx="22" fill="#fff"/>
    <rect x="184" y="288" width="210" height="120" rx="22" fill="#fff"/>
    <rect x="410" y="288" width="210" height="120" rx="22" fill="#fff"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <text x="175" y="145" font-size="24" font-weight="800" fill="#202124">policy</text>
    <text x="175" y="176" font-size="17" fill="#5f6368">rollout</text>
    <text x="400" y="145" font-size="24" font-weight="800" fill="#202124">feedback</text>
    <text x="400" y="176" font-size="17" fill="#5f6368">environment</text>
    <text x="625" y="145" font-size="24" font-weight="800" fill="#202124">self-teacher</text>
    <text x="625" y="176" font-size="17" fill="#5f6368">conditioned</text>
    <text x="289" y="341" font-size="24" font-weight="800" fill="#202124">dense signal</text>
    <text x="289" y="372" font-size="17" fill="#5f6368">token-level</text>
    <text x="515" y="341" font-size="24" font-weight="800" fill="#202124">SDPO</text>
    <text x="515" y="372" font-size="17" fill="#5f6368">update</text>
  </g>
  <g fill="none" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <path d="M280 152 H295"/>
    <path d="M505 152 H520"/>
    <path d="M605 216 C596 260 557 278 515 288"/>
    <path d="M410 348 H394"/>
    <path d="M265 288 C218 264 191 237 180 212"/>
  </g>
  <text x="400" y="455" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900" text-anchor="middle" fill="url(#accent)">Self-Distillation Policy Optimization</text>
