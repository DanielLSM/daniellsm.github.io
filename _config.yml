permalink: /posts/:title
markdown: kramdown

plugins:
  - jekyll-sitemap
  - jekyll-redirect-from

name: Daniel Marta
url: https://daniellsm.github.io
enforce_ssl: daniellsm.github.io
description: Daniel Marta's personal website

collections:
  ml:
    output: true
  math:
    output: true

defaults:
  - scope:
      path: ""
      type: ml
    values:
      layout: post
  - scope:
      path: ""
      type: math
    values:
      layout: post
